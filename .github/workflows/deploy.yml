name: Deploy MovecraftCannons

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⛏ Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: ⛏ Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v35
        with:
          files: |
            src/**
            build.gradle
            gradle/**
            gradlew
            gradlew.bat
            libs/**

      - name: ⛏ Setup Java
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: ⛏ Build Plugin
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --info 2>&1 | tee build.log || (cat build.log && exit 1)

      - name: ⛏ Copy Plugin to Server
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          source: "build/libs/MovecraftCannons-*.jar"
          target: "/laconio/missaria/plugins/"
          strip_components: 2

      - name: ⛏ Restart missaria
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            docker restart missaria
            echo "✅ Missaria restarted with new plugin"

# MovecraftCannons — Movecraft + Cannons integration
# Fixes cannon.move() NoSuchMethodError in Cannons 3.4.3 that causes
# reload progress, ammo and temperature to reset on craft translation.

# Set to true to log every cannon position update to console.
debug: false

# Server-wide language for health bars and other non-player displays.
# Supported: ru, uk
language: ru

# WASD control: move the craft by pressing movement keys while piloting.
wasd:
  # Minimum milliseconds between craft translations (controls speed).
  cooldown_ms: 200

# Y-coordinate of the water surface. Air blocks at or below this level
# in positions vacated by a moving craft will be restored to WATER.
waterLevel: 62

# Gradual repair: blocks placed per timer tick, and ticks between batches (1 tick = 50ms).
repair:
  blocks_per_tick: 1
  tick_delay: 5

# Wind mechanics: affects ships/airships whose craft type uses wool as a fly- or move-block.
# Five periods cycle in order: I(weak) → II(strong) → III(calm) → IV(strong) → V(storm).
# Wind direction is randomised each period (except calm). Ships gain/lose 2-4 blocks/s
# depending on whether they sail with or against the wind.
wind:
  period_duration_minutes: 15

# Item taken from the pilot's inventory per cannon fired via ship menu.
# Set material to '' to disable custom ammo consumption.
ammo:
  material: GUNPOWDER
  amount: 1

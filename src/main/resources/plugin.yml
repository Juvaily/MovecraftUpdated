name: MovecraftCannons
version: ${version}
main: me.missaria.movecraftcannons.MovecraftCannonsPlugin
api-version: '1.21'
description: Movecraft + Cannons integration — preserves cannon reload state during craft movement
author: Missaria
depend:
  - Movecraft
  - Cannons
commands:
  craftadmin:
    description: Открыть меню администратора для редактирования типа транспорта
    usage: /craftadmin [тип]
    permission: movecraftcannons.admin.craft
    aliases: [cadmin, ca]
  shipmenu:
    description: Открыть меню управления транспортом
    usage: /shipmenu
    aliases: [sm]
  windroll:
    description: Случайно изменить ветер (только для администраторов)
    usage: /windroll
    permission: movecraftcannons.admin.wind
  windmute:
    description: Включить/выключить уведомления о смене ветра
    usage: /windmute
    aliases: [wm]
  hudhide:
    description: Скрыть/показать HUD здоровья корабля
    usage: /hudhide

permissions:
  movecraftcannons.admin.wind:
    description: Доступ к команде /windroll
    default: op
  movecraftcannons.admin.craft:
    description: Доступ к команде /craftadmin (редактирование типов транспорта)
    default: op

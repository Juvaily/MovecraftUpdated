name: MovecraftCannons
version: ${version}
main: me.missaria.movecraftcannons.MovecraftCannonsPlugin
api-version: '1.21'
description: Movecraft + Cannons integration — preserves cannon reload state during craft movement
author: Missaria
depend:
  - Movecraft
  - Cannons
commands:
  shipmenu:
    description: Открыть меню управления транспортом
    usage: /shipmenu
    aliases: [sm]
  windroll:
    description: Случайно изменить ветер (только для администраторов)
    usage: /windroll
    permission: movecraftcannons.admin.wind
  windmute:
    description: Включить/выключить уведомления о смене ветра
    usage: /windmute
    aliases: [wm]

permissions:
  movecraftcannons.admin.wind:
    description: Доступ к команде /windroll
    default: op
